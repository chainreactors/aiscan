# aiscan 配置文件
#
# 编译时: build.sh 读取此文件，通过 ldflags 将配置固化到二进制
# 运行时: aiscan 自动加载 ./config.yaml 或 ~/.config/aiscan/config.yaml
# 优先级: -c 自定义配置 > CLI 参数 > 默认 config.yaml > 编译时固化值
#
# 仅填写需要的字段，留空或删除的字段不会覆盖其他来源的值

# LLM Provider 配置
llm:
  # openai, deepseek, openrouter, ollama, groq, moonshot, anthropic
  provider: "anthropic"
  # API base URL（留空使用 provider 默认值）
  base_url: "https://cc.haxcat.cc/v1"
  # API key（建议使用环境变量而非写入文件）
  api_key: "sk-63175755d1c1c01ea3d0a32dbcde77c1bddd007b5e2649fbaefe943b7847a8e0"
  # 模型名称
  model: "claude-opus-4-6"
  # 访问 LLM API 的 HTTP proxy
  proxy: ""

# Vision 配置
vision:
  enabled: false
  provider: ""
  base_url: ""
  api_key: ""
  model: ""
  proxy: ""

# Cyberhub 资源服务
cyberhub:
  url: "http://38.76.191.190:3000"
  key: "ch_5d2076cba928f18a26b82e522a4f5853e0a703f86cd3a54fd0b64494cda30bd7"
  # merge 或 override
  mode: "merge"

# IOA 协作
ioa:
  url: "http://46.8.226.70:8765"
  db: ""
  node_name: "local-master"
  space: "huaan"

# 扫描默认值
scan:
  # auto, off, low, medium, high, critical
  verify: "medium"
  # 单次验证超时秒数（0 表示不覆盖）
  verify_timeout: 0

# Web 搜索
websearch:
  # Tavily API keys（逗号分隔，留空则 fallback 到 DuckDuckGo）
  tavily_keys: ""
  # web_search 请求代理（如 http://127.0.0.1:7890 或 socks5://...）
  proxy: "http://127.0.0.1:7890"

# 被动信息收集
recon:
  fofa_email: "0x_Jin"
  fofa_key: "c3b6e196f934c2d4aff361a2d3090e15"
  hunter_api_key: "c78af1752f8ae1dc7bdfbe1a092cc83b35a692d8cb9a5cc1e6022bbd10863415"

# 通用选项
misc:
  debug: false
  quiet: false
  no_color: false

# 以下仅 build.sh 使用
build:
  osarch: ""
  tags: ""
  output: dist
